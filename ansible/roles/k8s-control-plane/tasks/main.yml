---
  # -------------------------------
  # 1. Disable Swap
  # -------------------------------
  - name: Disable swap
    command: swapoff -a
    when: ansible_swaptotal_mb > 0

  - name: Remove swap from fstab
    replace:
      path: /etc/fstab
      regexp: '^\S+\s+\S+\s+swap\s+.*$'
      replace: '# \g<0>'

  # -------------------------------
  # 2. Kernel modules
  # -------------------------------
  - name: Load kernel modules config
    copy:
      dest: /etc/modules-load.d/k8s.conf
      content: |
        overlay
        br_netfilter

  - name: Load modules
    shell: |
      modprobe overlay
      modprobe br_netfilter

  # -------------------------------
  # 3. Sysctl settings
  # -------------------------------
  - name: Configure sysctl
    copy:
      dest: /etc/sysctl.d/k8s.conf
      content: |
        net.bridge.bridge-nf-call-iptables = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward = 1

  - name: Apply sysctl
    command: sysctl --system

  # -------------------------------
  # 4. Install containerd
  # -------------------------------
  - name: Install containerd
    apt:
      name: containerd
      state: present
      update_cache: yes

  - name: Create containerd config dir
    file:
      path: /etc/containerd
      state: directory

  - name: Generate default containerd config
    command: containerd config default
    register: containerd_config
    changed_when: false

  - name: Write containerd config
    copy:
      dest: "{{ containerd_config_path }}"
      content: "{{ containerd_config.stdout }}"

  - name: Enable SystemdCgroup
    replace:
      path: "{{ containerd_config_path }}"
      regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'

  - name: Restart containerd
    systemd:
      name: containerd
      state: restarted
      enabled: true

  # -------------------------------
  # 5. Install Kubernetes tools
  # -------------------------------
  - name: Install dependencies
    apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
      state: present
      update_cache: yes

  - name: Create keyrings dir
    file:
      path: /etc/apt/keyrings
      state: directory
      mode: '0755'

  - name: Add Kubernetes GPG key
    shell: |
      curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key \
      | tee /etc/apt/keyrings/kubernetes-apt-keyring.asc
    args:
      creates: /etc/apt/keyrings/kubernetes-apt-keyring.asc

  - name: Add Kubernetes repo
    copy:
      dest: /etc/apt/sources.list.d/kubernetes.list
      content: |
        deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.asc] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /

  - name: Install kubelet kubeadm kubectl
    apt:
      name:
        - kubelet
        - kubeadm
        - kubectl
      state: present
      update_cache: yes

  - name: Hold Kubernetes packages
    command: apt-mark hold kubelet kubeadm kubectl

  # -------------------------------
  # 6. Initialize Control Plane
  # -------------------------------
  - name: Check if cluster already initialized
    stat:
      path: /etc/kubernetes/admin.conf
    register: kubeadm_init

  - name: Initialize Kubernetes control plane
    command: kubeadm init --pod-network-cidr={{ pod_network_cidr }}
    when: not kubeadm_init.stat.exists
    register: kubeadm_output

  # -------------------------------
  # 7. Configure kubectl for user
  # -------------------------------
  - name: Create .kube directory
    file:
      path: /home/daniel/.kube
      state: directory
      owner: daniel
      group: daniel
      mode: '0755'

  - name: Copy admin.conf
    copy:
      src: /etc/kubernetes/admin.conf
      dest: "{{ kubeconfig_path }}"
      remote_src: yes
      owner: daniel
      group: daniel

  # -------------------------------
  # 8. Install Calico CNI
  # -------------------------------
  - name: Apply Calico
    become_user: daniel
    environment:
      KUBECONFIG: "{{ kubeconfig_path }}"
    command: >
      kubectl apply -f
      https://raw.githubusercontent.com/projectcalico/calico/v3.27.2/manifests/calico.yaml
    when: not kubeadm_init.stat.exists

  # -------------------------------
  # 9. Output join command
  # -------------------------------
  - name: Get join command
    command: kubeadm token create --print-join-command
    register: join_command

  - name: Show join command
    debug:
      msg: "{{ join_command.stdout }}"