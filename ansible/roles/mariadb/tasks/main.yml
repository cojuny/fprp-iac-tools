---
- name: Install Docker
  apt:
    name: docker.io
    state: present
    update_cache: true
  become: true

- name: Ensure Docker service is running
  service:
    name: docker
    state: started
    enabled: true
  become: true

- name: Ensure data directory exists
  file:
    path: "{{ mariadb_data_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Pull MariaDB image
  community.docker.docker_image:
    name: "{{ mariadb_image }}"
    source: pull
  become: true

- name: Run MariaDB container
  community.docker.docker_container:
    name: mariadb
    image: "{{ mariadb_image }}"
    state: started
    restart_policy: always
    env:
      MYSQL_ROOT_PASSWORD: "{{ mariadb_root_password }}"
      MYSQL_USER: "{{ mariadb_user }}"
      MYSQL_PASSWORD: "{{ mariadb_user_password }}"
    volumes:
      - "{{ mariadb_data_dir }}:/var/lib/mysql"
    ports:
      - "{{ mariadb_port }}:3306"
  become: true