---
# --------------------------------------------------
# Install dependencies
# --------------------------------------------------
- name: Install required packages
  become: true
  apt:
    name:
      - openjdk-17-jdk
      - wget
      - tar
    state: present
    update_cache: true

# --------------------------------------------------
# Create nexus user
# --------------------------------------------------
- name: Create nexus group
  become: true
  group:
    name: "{{ nexus_user }}"
    gid: "{{ nexus_uid }}"
    state: present

- name: Create nexus user
  become: true
  user:
    name: "{{ nexus_user }}"
    uid: "{{ nexus_uid }}"
    group: "{{ nexus_user }}"
    shell: /usr/sbin/nologin
    create_home: false

# --------------------------------------------------
# Stop Nexus if running
# --------------------------------------------------
- name: Stop Nexus
  become: true
  systemd:
    name: nexus
    state: stopped
  ignore_errors: true

# --------------------------------------------------
# Handle data directory
# --------------------------------------------------
- name: Remove Nexus data (fresh install)
  become: true
  file:
    path: "{{ nexus_data_dir }}/nexus3"
    state: absent
  when: nexus_state == "fresh"

- name: Create Nexus data directory
  become: true
  file:
    path: "{{ nexus_data_dir }}/nexus3"
    state: directory
    owner: "{{ nexus_user }}"
    group: "{{ nexus_user }}"
    mode: "0755"

# --------------------------------------------------
# Prepare install directory
# --------------------------------------------------
- name: Create install directory
  become: true
  file:
    path: "{{ nexus_install_dir }}"
    state: directory
    mode: "0755"

# --------------------------------------------------
# Download Nexus
# --------------------------------------------------
- name: Download Nexus
  become: true
  get_url:
    url: "{{ nexus_download_url }}"
    dest: "/tmp/nexus.tar.gz"
    timeout: 30

# --------------------------------------------------
# Extract Nexus (idempotent)
# --------------------------------------------------
- name: Extract Nexus
  become: true
  unarchive:
    src: "/tmp/nexus.tar.gz"
    dest: "{{ nexus_install_dir }}"
    remote_src: yes
    creates: "{{ nexus_install_dir }}/nexus-{{ nexus_version }}"

# --------------------------------------------------
# Symlink current
# --------------------------------------------------
- name: Create nexus symlink
  become: true
  file:
    src: "{{ nexus_install_dir }}/nexus-{{ nexus_version }}"
    dest: "{{ nexus_install_dir }}/current"
    state: link
    force: true

# --------------------------------------------------
# Configure JVM (nexus.vmoptions)
# --------------------------------------------------
- name: Configure Xms
  become: true
  lineinfile:
    path: "{{ nexus_install_dir }}/current/bin/nexus.vmoptions"
    regexp: "^-Xms"
    line: "-Xms{{ nexus_java_opts.xms }}"

- name: Configure Xmx
  become: true
  lineinfile:
    path: "{{ nexus_install_dir }}/current/bin/nexus.vmoptions"
    regexp: "^-Xmx"
    line: "-Xmx{{ nexus_java_opts.xmx }}"

- name: Configure MaxDirectMemory
  become: true
  lineinfile:
    path: "{{ nexus_install_dir }}/current/bin/nexus.vmoptions"
    regexp: "^-XX:MaxDirectMemorySize="
    line: "-XX:MaxDirectMemorySize={{ nexus_java_opts.direct }}"

- name: Ensure correct data directory
  become: true
  lineinfile:
    path: "{{ nexus_install_dir }}/current/bin/nexus.vmoptions"
    regexp: "^-Dkaraf.data="
    line: "-Dkaraf.data={{ nexus_data_dir }}/nexus3"

# --------------------------------------------------
# Fix ownership
# --------------------------------------------------
- name: Ensure ownership
  become: true
  file:
    path: "{{ item }}"
    owner: "{{ nexus_user }}"
    group: "{{ nexus_user }}"
    recurse: yes
  loop:
    - "{{ nexus_install_dir }}"
    - "{{ nexus_data_dir }}"

# --------------------------------------------------
# Create systemd service
# --------------------------------------------------
- name: Create systemd service
  become: true
  copy:
    dest: /etc/systemd/system/nexus.service
    content: |
      [Unit]
      Description=Nexus Repository Manager
      After=network.target

      [Service]
      Type=forking
      LimitNOFILE=65536
      User={{ nexus_user }}
      Group={{ nexus_user }}
      ExecStart={{ nexus_install_dir }}/current/bin/nexus start
      ExecStop={{ nexus_install_dir }}/current/bin/nexus stop
      Restart=on-abort

      [Install]
      WantedBy=multi-user.target
  notify: restart nexus

# --------------------------------------------------
# Reload + start
# --------------------------------------------------
- name: Reload systemd
  become: true
  systemd:
    daemon_reload: yes

- name: Enable Nexus
  become: true
  systemd:
    name: nexus
    enabled: yes

- name: Start Nexus
  become: true
  systemd:
    name: nexus
    state: started