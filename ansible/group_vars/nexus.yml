# Nexus version
nexus_version: "3.90.1-01"

# Download URL
nexus_download_url: "https://download.sonatype.com/nexus/3/nexus-{{ nexus_version }}-linux-x86_64.tar.gz"

# Directories
nexus_install_dir: "/opt/nexus"
nexus_data_dir: "/opt/sonatype-work"

# Service user
nexus_user: "nexus"
nexus_uid: 200

# Port
nexus_http_port: 8081

# JVM tuning (used in nexus.vmoptions)
nexus_java_opts:
  xms: "1024m"
  xmx: "1024m"
  direct: "1024m"

# Deployment mode: fresh | keep
nexus_state: "fresh"